name: Build Electron App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build app
      run: npm run build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: memmeow-installer
        path: dist/

steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      # 使用镜像代理加速拉取
      repository: XingGreen/MemMeow_2.git
      token: ${{ secrets.GITHUB_TOKEN }}
      # 关键：配置 Git 代理（针对 github.com）
      fetch-depth: 0
    env:
      # 配置 Git 使用国内镜像或代理解析
      GIT_CONFIG_GLOBAL: |
        [url "https://ghproxy.com/https://github.com/"]
          insteadOf = https://github.com/