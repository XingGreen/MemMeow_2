<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摩斯喵语转译器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 20px;
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.1),
                -10px -10px 20px rgba(255, 255, 255, 0.8);
        }

        h1 {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-section, .output-section {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #f0f0f0;
            box-shadow: 
                inset 5px 5px 10px rgba(0, 0, 0, 0.05),
                inset -5px -5px 10px rgba(255, 255, 255, 0.5);
        }

        h2 {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            box-shadow: 
                inset 3px 3px 6px rgba(0, 0, 0, 0.05),
                inset -3px -3px 6px rgba(255, 255, 255, 0.5);
            resize: none;
            font-size: 16px;
            font-family: inherit;
            color: #333;
        }

        textarea:focus {
            outline: none;
        }

        .buttons-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: #f0f0f0;
            box-shadow: 
                5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.8);
            font-size: 16px;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            box-shadow: 
                3px 3px 6px rgba(0, 0, 0, 0.1),
                -3px -3px 6px rgba(255, 255, 255, 0.8);
            transform: translateY(2px);
        }

        button:active {
            box-shadow: 
                inset 3px 3px 6px rgba(0, 0, 0, 0.1),
                inset -3px -3px 6px rgba(255, 255, 255, 0.8);
        }

        .copy-button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 20px;
        }

        .nav-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-button {
            padding: 10px 20px;
            font-size: 14px;
        }

        footer {
            text-align: center;
            font-size: 14px;
            color: #999;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            .buttons-section {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>摩斯喵语转译器</h1>

        <div class="input-section">
            <h2>输入内容</h2>
            <textarea id="inputText" placeholder="请输入字母、摩斯电码或喵语"></textarea>
        </div>

        <div class="buttons-section">
            <button onclick="convertToMorse()">转摩斯电码</button>
            <button onclick="convertToMeow()">转喵语</button>
            <button onclick="convertToLetter()">转字母</button>
        </div>

        <div class="output-section">
            <h2>转换结果</h2>
            <textarea id="outputText" readonly placeholder="转换结果将显示在这里"></textarea>
            <button class="copy-button" onclick="copyResult()">复制结果</button>
        </div>

        <div class="nav-section">
            <button class="nav-button" onclick="openAbout()">关于</button>
            <button class="nav-button" onclick="openDeclaration()">声明</button>
        </div>

        <footer>
            <p>项目地址: <a href="https://github.com/example/MorseMeow" target="_blank">https://github.com/example/MorseMeow</a></p>
        </footer>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
